<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎈 六一儿童节快乐 🎈</title>
    <style>
        /* 原有样式保持不变 */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh;
            background: linear-gradient(135deg, #fce4ec, #e1f5fe, #fff9c4);
            display:flex; justify-content:center; align-items:center;
            font-family:'Comic Sans MS','Chalkboard SE',cursive,sans-serif;
            overflow:hidden;
            position:relative;
        }
        .container {
            text-align:center; z-index:10; position:relative;
            animation:fadeIn 1.5s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
        .title {
            font-size:5rem; color:#ff6b81;
            text-shadow:4px 4px 0 #ff4757,8px 8px 0 rgba(255,165,0,0.3),12px 12px 0 rgba(255,215,0,0.2);
            letter-spacing:6px; animation:bounce 2s infinite; cursor:default;
        }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
        .subtitle {
            font-size:2rem; color:#5f27cd; margin-top:20px; opacity:0.9;
            animation:twinkle 3s infinite alternate;
        }
        @keyframes twinkle { 0%{opacity:0.4;transform:scale(0.95)} 100%{opacity:1;transform:scale(1.05)} }
        .heart-container { margin:30px auto; font-size:0; animation:pulse 1s infinite alternate; }
        @keyframes pulse { 0%{transform:scale(0.9)} 100%{transform:scale(1.15)} }
        .heart-container svg { width:120px; height:120px; filter:drop-shadow(0 0 15px rgba(255,107,129,0.6)); }
        .balloons { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .balloon {
            position:absolute; bottom:-150px; width:60px; height:80px;
            border-radius:50% 50% 50% 50% / 40% 40% 60% 60%; opacity:0.85;
            animation:floatUp 8s linear infinite;
            box-shadow:inset -10px -10px 20px rgba(0,0,0,0.1);
        }
        .balloon::after { content:''; position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); width:2px; height:30px; background:#888; }
        .balloon::before { content:''; position:absolute; bottom:-26px; left:50%; transform:translateX(-3px); width:6px; height:6px; background:#aaa; clip-path:polygon(50% 100%,0 0,100% 0); }
        @keyframes floatUp { 0%{transform:translateY(0) rotate(0deg);opacity:0.9} 100%{transform:translateY(-110vh) rotate(20deg);opacity:0} }
        .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
        .star {
            position:absolute; width:6px; height:6px; background:#fff; border-radius:50%;
            animation:twinkleStar 2s infinite alternate;
        }
        @keyframes twinkleStar { 0%{opacity:0.2;transform:scale(0.5)} 100%{opacity:1;transform:scale(1.2)} }
        .flags { margin-top:40px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
        .flag {
            width:30px; height:40px; background:#fbc531;
            clip-path:polygon(0 0,100% 0,50% 100%);
            animation:wave 1.5s ease-in-out infinite alternate;
        }
        .flag:nth-child(2) { background:#4cd137; animation-delay:0.3s; }
        .flag:nth-child(3) { background:#e84118; animation-delay:0.6s; }
        .flag:nth-child(4) { background:#9c88ff; animation-delay:0.9s; }
        .flag:nth-child(5) { background:#f5a623; animation-delay:1.2s; }
        .flag:nth-child(6) { background:#00a8ff; animation-delay:1.5s; }
        @keyframes wave { 0%{transform:rotate(-5deg)} 100%{transform:rotate(5deg)} }
        @media (max-width:600px) {
            .title { font-size:3rem; }
            .subtitle { font-size:1.5rem; }
            .heart-container svg { width:80px; height:80px; }
        }

        /* ===== 新增：播放提示浮层 ===== */
        #play-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.5s;
        }
        #play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #play-button {
            background: rgba(255,255,255,0.9);
            border-radius: 60px;
            padding: 20px 40px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6b81;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }
        #play-button:hover {
            transform: scale(1.05);
        }
        #play-button span {
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <!-- 背景音乐标签 -->
    <audio id="bg-music" loop preload="auto">
        <source src="宝宝巴士 - 我会自己上厕所.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>

    <!-- 播放浮层（初始显示） -->
    <div id="play-overlay">
        <div id="play-button">
            <span>🎵</span> 点击播放音乐
        </div>
    </div>

    <!-- 原有页面内容 -->
    <div class="stars" id="stars"></div>
    <div class="balloons" id="balloons"></div>
    <div class="container">
        <div class="title">🎉 六一儿童节快乐 🎉</div>
        <div class="subtitle">愿你童心未泯，所遇皆甜 🍭</div>
        <div class="heart-container">
            <svg viewBox="0 0 24 24">
                <path fill="#ff6b81" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <div class="flags">
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
            <div class="flag"></div>
        </div>
    </div>

    <script>
        // 原有JS（星星、气球）
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (2 + Math.random() * 4) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.backgroundColor = `hsl(${Math.random()*60+30}, 80%, 90%)`;
            starsContainer.appendChild(star);
        }

        const balloonContainer = document.getElementById('balloons');
        const colors = ['#ff6b81','#ffa502','#2ed573','#1e90ff','#a29bfe','#fd79a8','#fdcb6e'];
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            const color = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.background = color;
            balloon.style.left = Math.random() * 100 + '%';
            balloon.style.width = (40 + Math.random() * 40) + 'px';
            balloon.style.height = (50 + Math.random() * 50) + 'px';
            balloon.style.animationDuration = (6 + Math.random() * 5) + 's';
            balloon.style.animationDelay = Math.random() * 5 + 's';
            balloonContainer.appendChild(balloon);
        }
        for (let i = 0; i < 20; i++) {
            setTimeout(createBalloon, i * 300);
        }
        setInterval(createBalloon, 4000);

        // ===== 新增：音乐播放控制 =====
        const audio = document.getElementById('bg-music');
        const overlay = document.getElementById('play-overlay');

        // 尝试自动播放（可能被浏览器拒绝）
        function tryAutoPlay() {
            audio.play().then(() => {
                // 自动播放成功，隐藏覆盖层
                overlay.classList.add('hidden');
            }).catch(() => {
                // 自动播放失败，保留覆盖层等待用户点击
                console.log('自动播放被阻止，等待用户交互');
            });
        }

        // 用户点击覆盖层或按钮时播放
        function playMusic() {
            audio.play().then(() => {
                overlay.classList.add('hidden');
            }).catch(err => {
                alert('无法播放音频：' + err.message);
            });
        }

        // 绑定点击事件（覆盖层任意位置）
        overlay.addEventListener('click', playMusic);

        // 页面加载后尝试自动播放
        window.addEventListener('load', tryAutoPlay);

        // 也可在用户第一次点击页面其他元素时尝试播放（备选方案）
        document.body.addEventListener('click', function once() {
            if (!overlay.classList.contains('hidden')) {
                playMusic();
            }
            document.body.removeEventListener('click', once);
        }, { once: true });
    </script>
</body>
</html>
